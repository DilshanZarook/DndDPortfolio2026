<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bento - Ultra Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/Flip.min.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; color:#fff; overflow-x:hidden; font-family:sans-serif; }

    .info {
      position:fixed; top:10px; left:10px; z-index:1000;
      background:rgba(255,0,0,0.8); padding:10px; border-radius:6px; font-size:14px;
    }

    .gallery-wrap {
      height: 100dvh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
      contain: layout style paint;
    }

    .gallery {
      width: 100%;
      height: 100%;
    }

    .gallery__item {
      position: relative;
      overflow: hidden;
    }

    .gallery__item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gallery--bento {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, 32vw);
      grid-template-rows: repeat(4, 22vh);
    }

    .gallery--final.gallery--bento {
      grid-template-columns: repeat(3, 100vw);
      grid-template-rows: repeat(4, 50dvh);
      gap: 8px;
    }

    .gallery--bento .gallery__item:nth-child(1) { grid-area: 1/1/3/2; }
    .gallery--bento .gallery__item:nth-child(2) { grid-area: 1/2/2/3; }
    .gallery--bento .gallery__item:nth-child(3) { grid-area: 2/2/4/3; }
    .gallery--bento .gallery__item:nth-child(4) { grid-area: 1/3/3/3; }
    .gallery--bento .gallery__item:nth-child(5) { grid-area: 3/1/3/2; }
    .gallery--bento .gallery__item:nth-child(6) { grid-area: 3/3/5/4; }
    .gallery--bento .gallery__item:nth-child(7) { grid-area: 4/1/5/2; }
    .gallery--bento .gallery__item:nth-child(8) { grid-area: 4/2/5/3; }
  </style>
</head>
<body>

  <div class="info">Bento Ultra Debug - Scroll Slowly</div>

  <div class="gallery-wrap">
    <div class="gallery gallery--bento" id="gallery-8">
      <div class="gallery__item"><img src="https://assets.codepen.io/16327/portrait-pattern-1.jpg" alt=""/></div>
      <div class="gallery__item"><img src="https://assets.codepen.io/16327/portrait-image-12.jpg" alt=""/></div>
      <div class="gallery__item"><img src="https://assets.codepen.io/16327/portrait-image-8.jpg" alt=""/></div>
      <div class="gallery__item"><img src="https://assets.codepen.io/16327/portrait-pattern-2.jpg" alt=""/></div>
      <div class="gallery__item"><img src="https://assets.codepen.io/16327/portrait-image-4.jpg" alt=""/></div>
      <div class="gallery__item"><img src="https://assets.codepen.io/16327/portrait-image-3.jpg" alt=""/></div>
      <div class="gallery__item"><img src="https://assets.codepen.io/16327/portrait-pattern-3.jpg" alt=""/></div>
      <div class="gallery__item"><img src="https://assets.codepen.io/16327/portrait-image-1.jpg" alt=""/></div>
    </div>
  </div>

  <script>
    gsap.registerPlugin(ScrollTrigger, Flip);

    let flipCtx;

    function init() {
      if (flipCtx) flipCtx.revert();

      const gallery = document.getElementById("gallery-8");
      const wrap = gallery.parentElement;

      gallery.classList.remove("gallery--final");

      flipCtx = gsap.context(() => {
        const state = Flip.getState(gallery.children);

        gallery.classList.add("gallery--final");

        Flip.to(state, {
          duration: 1,
          ease: "power2.inOut",
          simple: true,
          scrollTrigger: {
            trigger: wrap,
            start: "top top",
            end: "+=200%",
            scrub: 1,
            pin: true,
            pinSpacing: true,
            invalidateOnRefresh: true
          }
        });
      });
    }

    window.addEventListener("load", () => {
      ScrollTrigger.config({ ignoreMobileResize: true });
      ScrollTrigger.normalizeScroll(true);
      init();
    });

    window.addEventListener("resize", () => setTimeout(init, 400));
    window.addEventListener("orientationchange", () => setTimeout(() => { ScrollTrigger.refresh(true); init(); }, 600));
  </script>
</body>
</html>
